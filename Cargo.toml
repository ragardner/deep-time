[package]
name = "deep-time-core"
version = "0.1.0"
edition = "2024"
description = "Core high-precision time types, clocks, and flexible date/duration parser"
license = "Apache-2.0"
repository = "https://github.com/ragardner/deep-time-core"
keywords = ["time", "date", "duration", "parser", "clock", "astronomy", "astrodynamics", "no-std"]
categories = ["date-and-time", "no-std", "science"]
readme = "README.md"
rust-version = "1.90"

[dependencies]
libm = "0.2"

hashbrown = { version = "0.17", optional = true }
aho-corasick = { version = "1.1.4", optional = true }
once_cell = { version = "1.21", optional = true, default-features = false, features = ["alloc"] }

jiff = { version = "0.2.23", optional = true, default-features = false }
chrono = { version = "0.4", optional = true, default-features = false }
hifitime = { version = "4.2", optional = true, default-features = false }
serde = { version = "1.0", optional = true, default-features = false, features = ["derive", "rc"] }
tsify = { version = "=0.5.6", optional = true }
wasm-bindgen = { version = "0.2", optional = true, features = ["serde-serialize"] }
js-sys = { version = "0.3", optional = true }
sys-locale = { version = "0.3", optional = true }

[features]
# ──────────────────────────────────────────────────────────────
# CORE FEATURES
# ──────────────────────────────────────────────────────────────
default = []

alloc = [
    "jiff?/alloc",
    "chrono?/alloc",
]

std = [
    "alloc",
    "jiff?/std",
    "chrono?/std",
    "hifitime?/std",
]

# ──────────────────────────────────────────────────────────────
# PARSER / LANGUAGE (no_std friendly)
# ──────────────────────────────────────────────────────────────
parse = [
    "alloc",
    "dep:aho-corasick",
    "dep:once_cell",
    "dep:hashbrown",
]

fr = ["parse"]
euro = ["parse", "fr"]
lang = ["parse", "euro"]

# ──────────────────────────────────────────────────────────────
# LOCALE
# ──────────────────────────────────────────────────────────────
locale = ["alloc", "dep:sys-locale"] # TODO: requires std?

# ──────────────────────────────────────────────────────────────
# SERIALIZATION
# ──────────────────────────────────────────────────────────────
serde = [
    "dep:serde",
    "jiff?/serde",
    "chrono?/serde",
    "hifitime?/serde",
]

# ──────────────────────────────────────────────────────────────
# DATETIME (std is optional)
# ──────────────────────────────────────────────────────────────
ut1 = [
    "std",
]

jiff = [
    "dep:jiff",
    "jiff?/alloc",
]

jiff-tz = [
    "std",
    "jiff",
    "jiff?/tzdb-bundle-always",
]

chrono = [
    "dep:chrono",
    "chrono?/alloc",
]

hifitime = [
    "dep:hifitime",
]

# ──────────────────────────────────────────────────────────────
# WEB / WASM / TYPESCRIPT
# ──────────────────────────────────────────────────────────────
js = [
    "std",
    "serde",
    "dep:tsify",
    "dep:wasm-bindgen",
    "dep:js-sys",
    "jiff?/js",
    "chrono?/wasmbind",
    "sys-locale?/js",
]

tsify = [
    "serde",
    "dep:tsify",
    "dep:wasm-bindgen",
    "js",
]

# ──────────────────────────────────────────────────────────────
# ALL
# ──────────────────────────────────────────────────────────────
all = [
    "lang",
    "locale",
    "js",
    "chrono",
    "jiff",
    "hifitime",
    "serde",
]

# Internal tests
perf-tests = []
ut1-tests = ["ut1"]

[lib]
crate-type = ["cdylib", "rlib"]