[package]
name = "deep-time-core"
version = "0.1.0"
edition = "2024"
rust-version = "1.90"
description = "Core high-precision time types and povs (Point + Delta)"
license = "Apache-2.0"
repository = "https://github.com/ragardner/deep-time-core"
keywords = ["time", "pov", "astronomy", "astrodynamics", "no-std"]
categories = ["date-and-time", "no-std", "science"]

[dependencies]
# Optional dependencies only
serde = { version = "1.0", optional = true, default-features = false, features = ["derive"] }
tsify = { version = "=0.5.5", optional = true }
wasm-bindgen = { version = "0.2", optional = true, features = ["serde-serialize"] }
js-sys = { version = "0.3", optional = true }

[features]
# ──────────────────────────────────────────────────────────────
# CORE / NO-STD FEATURES
# ──────────────────────────────────────────────────────────────
default = []          # Do not enable std by accident

alloc = []            # Enables `alloc`
std = ["alloc"]       # Enables the full std library + alloc

# ──────────────────────────────────────────────────────────────
# SERIALIZATION
# ──────────────────────────────────────────────────────────────
serde = ["dep:serde"] # Enables `Serialize`/`Deserialize`

# ──────────────────────────────────────────────────────────────
# WEB / WASM / TYPESCRIPT INTEROP
# ──────────────────────────────────────────────────────────────
# Enables full JS/WASM + TypeScript definitions support.
# Pulls in `std`, `serde`, `tsify`, and `wasm-bindgen`.
js = [
    "std",
    "serde",
    "dep:tsify",
    "dep:wasm-bindgen",
    "dep:js-sys",
]

[lib]
crate-type = ["rlib"]