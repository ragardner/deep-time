[package]
name = "deep-time-core"
version = "0.1.0"
edition = "2024"
description = "Core high-precision time types, clocks, and flexible date/duration parser"
license = "Apache-2.0"
repository = "https://github.com/ragardner/deep-time-core"
keywords = ["time", "date", "duration", "parser", "clock", "astronomy", "astrodynamics", "no-std"]
categories = ["date-and-time", "no-std", "science"]
readme = "README.md"
rust-version = "1.90"

[dependencies]
libm = "0.2"

aho-corasick = { version = "1.1.4", optional = true }
jiff = { version = "0.2.23", optional = true, default-features = false }
chrono = { version = "0.4", optional = true, default-features = false }
serde = { version = "1.0", optional = true, default-features = false, features = ["derive", "rc"] }
tsify = { version = "=0.5.5", optional = true }
wasm-bindgen = { version = "0.2", optional = true, features = ["serde-serialize"] }
js-sys = { version = "0.3", optional = true }
sys-locale = { version = "0.3", optional = true }

[features]
# ──────────────────────────────────────────────────────────────
# STD / ALLOC (core priority)
# ──────────────────────────────────────────────────────────────
default = []

alloc = [
    "jiff?/alloc",
]

std = [
    "alloc",
    "dep:aho-corasick",
    "jiff?/std",
]

# ──────────────────────────────────────────────────────────────
# LANGUAGE / PARSER FEATURES (all require std)
# ──────────────────────────────────────────────────────────────
fr = ["std"]
euro = ["std", "fr"]
lang = ["std", "euro"]

# ──────────────────────────────────────────────────────────────
# LOCALE
# ──────────────────────────────────────────────────────────────
locale = ["std", "dep:sys-locale"]

# ──────────────────────────────────────────────────────────────
# SERIALIZATION
# ──────────────────────────────────────────────────────────────
serde = [
    "dep:serde",
    "jiff?/serde",
    "chrono?/serde",
]

# ──────────────────────────────────────────────────────────────
# DATETIME INTEROP
# ──────────────────────────────────────────────────────────────
jiff = [
    "std",
    "dep:jiff",
]
jiff-tz = [
    "jiff",
    "jiff?/tzdb-bundle-always",
]

chrono = [
    "std",
    "dep:chrono",
    "chrono/std",
]

# ──────────────────────────────────────────────────────────────
# WEB / WASM / TYPESCRIPT
# ──────────────────────────────────────────────────────────────
js = [
    "std",
    "serde",
    "dep:tsify",
    "dep:wasm-bindgen",
    "dep:js-sys",
    "jiff?/js",
    "chrono?/wasmbind",
    "sys-locale?/js",
]

tsify = [
    "serde",
    "dep:tsify",
    "dep:wasm-bindgen",
    "js",
]

# ──────────────────────────────────────────────────────────────
# ALL
# ──────────────────────────────────────────────────────────────
all = [
    "lang",
    "locale",
    "js",
    "chrono",
    "jiff",
    "serde",
]

# Internal tests
perf_tests = []

[lib]
crate-type = ["cdylib", "rlib"]