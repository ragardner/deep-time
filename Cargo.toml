[package]
name         = "deep-time-core"
version      = "0.1.0"
edition      = "2024"
rust-version = "1.90"
description  = "Core high-precision time types and clocks"
license      = "Apache-2.0"
repository   = "https://github.com/ragardner/deep-time-core"
keywords     = ["time", "date", "clock", "astronomy", "astrodynamics", "no-std"]
categories   = ["date-and-time", "no-std", "science"]

[dependencies]
libm         = "0.2"

# Optional dependencies
serde        = { version = "1.0", optional = true, default-features = false, features = ["derive"] }
tsify        = { version = "=0.5.5", optional = true }
wasm-bindgen = { version = "0.2", optional = true, features = ["serde-serialize"] }
js-sys       = { version = "0.3", optional = true }
jiff         = { version = "=0.2.23", optional = true, default-features = false }
chrono       = { version = "0.4", optional = true, default-features = false }

[features]
# ──────────────────────────────────────────────────────────────
# STD / ALLOC
# ──────────────────────────────────────────────────────────────
default  = [] # Do not enable std by accident

alloc  = ["jiff?/alloc", "chrono?/alloc"]
std    = ["alloc", "jiff?/std", "chrono?/std"]

# ──────────────────────────────────────────────────────────────
# SERIALIZATION
# ──────────────────────────────────────────────────────────────
serde  = ["dep:serde", "jiff?/serde", "chrono?/serde"]

# ──────────────────────────────────────────────────────────────
# DATETIME INTEROP
# ──────────────────────────────────────────────────────────────
jiff   = ["dep:jiff", "std", "jiff/tzdb-bundle-always"]
chrono = ["dep:chrono"]

# ──────────────────────────────────────────────────────────────
# WEB / WASM / TYPESCRIPT INTEROP
# ──────────────────────────────────────────────────────────────
# Enables full JS/WASM + TypeScript definitions support.
# Pulls in `std`, `serde`, `tsify`, `wasm-bindgen`, `js-sys`, and forwards
# the matching features to Jiff + Chrono.
js = [
    "std",
    "serde",
    "dep:tsify",
    "dep:wasm-bindgen",
    "dep:js-sys",
    "jiff?/js",
]

[lib]
crate-type = ["rlib"]